services:
  # ── Backend Spring Boot Service ─────────────────────────────────────────────
  - type: web
    name: bengali-shadi-backend
    env: docker
    plan: free
    # Route traffic to Port 18080
    envVars:
      - key: PORT
        value: 18080
      # Automatically read database credentials from the database defined below
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: bengali-shadi-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: bengali-shadi-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: bengali-shadi-db
          property: password
      # OpenRouter API Key (Render will ask you to type this in when deploying)
      - key: OPENROUTER_API_KEY
        sync: false
      # Allowed origins for CORS (Render will ask you to type this in)
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false

  # ── Frontend React Service ──────────────────────────────────────────────────
  - type: web
    name: bengali-shadi-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        sync: false # Point this to your backend service URL + /api (e.g. https://bengali-shadi-backend.onrender.com/api)

# ── PostgreSQL Database ───────────────────────────────────────────────────────
databases:
  - name: bengali-shadi-db
    databaseName: bengali_shadi
    user: postgres
    plan: free

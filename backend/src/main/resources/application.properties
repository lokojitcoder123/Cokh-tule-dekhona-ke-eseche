spring.application.name=bengali-shadi
server.port=${PORT:18080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ── Database ─────────────────────────────────────────────────────────────────
# Default: local MySQL. Override with env vars for production (Render/cloud).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bengali_shadi?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# ── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# ── AI (OpenRouter — OpenAI-compatible) ──────────────────────────────────────
app.ai.api-key=${OPENROUTER_API_KEY:}
app.ai.model=${AI_MODEL:deepseek/deepseek-chat-v3-0324}
app.ai.base-url=${AI_BASE_URL:https://openrouter.ai/api/v1}

# ── Multipart / File Uploads ──────────────────────────────────────────────────
server.tomcat.max-http-post-size=10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.bengalishadi=INFO

<!DOCTYPE html>
<html>
<head>
  <title>Base64 Converter</title>
</head>
<body>
  <h1>Converting Images to Base64...</h1>
  <canvas id="canvas" style="display:none;"></canvas>
  <textarea id="output" style="width:100%; height:500px; font-family:monospace;"></textarea>
  <script>
    const images = [
      "file:///C:/Users/LOKOJIT/.gemini/antigravity-ide/brain/9ac8363b-479f-455c-8f45-bafb814aa789/media__1783108395900.jpg",
      "file:///C:/Users/LOKOJIT/.gemini/antigravity-ide/brain/9ac8363b-479f-455c-8f45-bafb814aa789/media__1783108423201.png",
      "file:///C:/Users/LOKOJIT/.gemini/antigravity-ide/brain/9ac8363b-479f-455c-8f45-bafb814aa789/media__1783108442123.jpg",
      "file:///C:/Users/LOKOJIT/.gemini/antigravity-ide/brain/9ac8363b-479f-455c-8f45-bafb814aa789/media__1783108466758.png",
      "file:///C:/Users/LOKOJIT/.gemini/antigravity-ide/brain/9ac8363b-479f-455c-8f45-bafb814aa789/media__1783108505210.png"
    ];
    
    async function process() {
      const results = [];
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      
      for (let i = 0; i < images.length; i++) {
        try {
          const img = new Image();
          img.crossOrigin = "anonymous";
          img.src = images[i];
          await new Promise((resolve, reject) => {
            img.onload = resolve;
            img.onerror = () => reject(new Error("Failed to load: " + images[i]));
          });
          
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          
          const isPng = images[i].endsWith(".png");
          const format = isPng ? "image/png" : "image/jpeg";
          const dataURL = canvas.toDataURL(format);
          results.push({ index: i, success: true, data: dataURL });
        } catch (err) {
          results.push({ index: i, success: false, error: err.message });
        }
      }
      document.getElementById("output").value = JSON.stringify(results, null, 2);
    }
    
    process();
  </script>
</body>
</html>
